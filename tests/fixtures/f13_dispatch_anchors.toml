# ─── GPU anchor: HGRN-Bit Mini × batch=1 measured WARM-STATE (THIS HARDWARE, F.13.1 v2) ──
# Naive path with explicit GPU clock-stabilization pre-warmup.
# Replaces the F.13.1 v1 anchor (19.7 tok/s) which was a COLD-GPU ARTIFACT
# from immediately-post-driver-restoration. v2 confirms warm steady-state
# is 118-120 tok/s across multiple consecutive runs.
[gpu_hgrn_bit_mini_batch1_measured]
value_tok_per_sec_median = 118.9
value_ms_per_token_median = 8.41
value_ms_per_token_p95 = 8.81
hardware = "Intel Core i9-14900HX + NVIDIA GeForce RTX 4090 Laptop GPU"
inference_stack = "PyTorch 2.6.0+cu124 eager mode, HGRN-Bit upstream triton kernels, NO KV cache, naive growing-sequence forward"
gpu_pre_warmup_matmuls = 50  # required to stabilize laptop GPU clocks; without it numbers drop ~6x
n_warmup = 5
n_timed = 64
source = "internal — F.13.1 v2 bench 2026-05-01, paper/intllm/results/f13_dispatch_calibration.json (third stable run)"
verified = "2026-05-01"
revisit_at = "2026-11-01"
tolerance_pct = 15
note = "HGRN-Bit specific, naive path (no KV cache, no compile). REPLACES F.13.1 v1 cold-GPU artifact (19.7 tok/s). Warm-state baseline aligns with [gpu_small_model_batch1_decode] anchor band (118.9 in 80-120 range, EDGE). For optimized-stack measurement on same hardware, see [gpu_hgrn_bit_mini_batch1_optimized_best]."

# ─── GPU anchor: HGRN-Bit Mini × batch=1 OPTIMIZED (THIS HARDWARE, F.13.1 v2) ──
# Best measured path: KV cache via HGRN-Bit RecurrentCache + torch.compile(mode="default").
# This represents what FajarOS Nova WOULD see if it deployed an optimized GPU
# dispatch path (modulo further gains from CUDA graphs, FP16, or TensorRT
# export which we did not attempt here).
[gpu_hgrn_bit_mini_batch1_optimized_best]
value_tok_per_sec_median = 202.6
value_ms_per_token_median = 4.94
value_ms_per_token_p95 = 5.05
hardware = "Intel Core i9-14900HX + NVIDIA GeForce RTX 4090 Laptop GPU"
inference_stack = "PyTorch 2.6.0+cu124 + HGRN-Bit RecurrentCache (use_cache=True, single-token forward) + torch.compile(mode='default', dynamic=False)"
speedup_vs_naive = 1.70
n_warmup = 10  # extra for compile graph capture
n_timed = 64
source = "internal — F.13.1 v2 bench 2026-05-01, paper/intllm/results/f13_dispatch_calibration.json"
verified = "2026-05-01"
revisit_at = "2026-11-01"
tolerance_pct = 15
notes_compile_modes = [
    "torch.compile(mode='default') worked: 202.6 tok/s, 1.70x over naive",
    "torch.compile(mode='reduce-overhead') FAILED: HGRN-Bit init_state uses in-place state += pattern that breaks CUDAGraphs; cudagraph_mark_step_begin() did not resolve. Upstream model code change required for full CUDA graphs path.",
    "Further optimization avenues NOT attempted: FP16/BF16 cast, TensorRT export, custom fused CUDA kernel for HGRN recurrent cell.",
]
note = "HGRN-Bit optimized path on this hardware EXCEEDS the literature anchor band [gpu_small_model_batch1_decode] (80-120) by ~70%. Likely explanations: (a) RTX 4090 Laptop is top-tier consumer GPU class, (b) HGRN's recurrent state is more cache-friendly than transformer KV at this scale, (c) Mini's small hidden_size=256 fits register tiles efficiently. CRITICAL: 202.6 tok/s is AT or just-above the conservative CPU-TL2 lower-bound projection (200 tok/s) used in I2/G3. Verdict G3 cushion has effectively VANISHED with measurement; static-rule verdict still holds for FajarOS Nova because (1) GPU dispatch path is not built, (2) CPU-TL2 projection upper bound is 400 tok/s and could exceed 200 once F.11 parity allows real measurement, (3) building optimized GPU dispatch is multi-week engineering."

