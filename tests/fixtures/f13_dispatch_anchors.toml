# F.13 Dispatch Heuristic — Pinned Literature Anchors
#
# These are the external/upstream numbers that the F.13.3 decision-doc
# (`docs/FJQ_PHASE_F_F13_DISPATCH_DECISION.md`) cites in lieu of live
# measurements. The verify gate `make verify-f13-decision` re-asserts
# that the decision-doc's claims stay within these ranges.
#
# Why pin them?
# - F.13 ships in Z-narrow scope without live measurements (no GPU
#   driver in this environment, F.11 TL2 parity gap blocks live TL2
#   bench). The verdict is architecture-derived but anchored to public
#   reference numbers. If those numbers shift (e.g. BitNet readme is
#   re-benchmarked, NVIDIA programming guide is revised), the verdict
#   may no longer hold.
# - Per CLAUDE.md §6.8 R3: every class-of-bugs fix needs a prevention
#   layer, not just the patch.
#
# Update protocol:
# - Re-verify each entry against its `source` URL on the schedule
#   in `revisit_at`. If the upstream number drifts beyond the
#   `tolerance_pct`, file a follow-up to revisit the F.13.3 verdict.
# - Bumping any value here MUST be accompanied by a docs/FJQ_PHASE_F_F13_*.md
#   update in the same commit (verify gate will fail otherwise).

schema_version = "1.0"
created = "2026-04-30"
phase = "F.13.5 prevention layer"

