name: Paper Reproduce Smoke

# V26 Plan C4.2.5 — CI smoke test for paper reproducibility.
# Validates all paper claims against committed data files.
# No GPU needed — uses pre-computed results in data/kv_cache/.
# Catches data drift 2 weeks before submission, not 2 days after.

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'scripts/**'
      - 'paper/**'
      - 'data/**'
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  verify:
    name: verify paper claims (28 checks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install minimal deps
        run: pip install numpy

      - name: Verify paper tables (28 claims)
        run: python scripts/verify_paper_tables.py --strict

      - name: Check v3.1 result files exist
        run: |
          for f in \
            data/kv_cache/perplexity_v3.1_gemma_4_e2b_2bit.json \
            data/kv_cache/perplexity_v3.1_gemma_4_e2b_3bit.json \
            data/kv_cache/perplexity_v3.1_gemma_4_e2b_4bit.json \
            data/kv_cache/perplexity_v3.1_mistral_2bit.json \
            data/kv_cache/perplexity_v3.1_mistral_3bit.json \
            data/kv_cache/perplexity_v3.1_mistral_4bit.json \
            data/kv_cache/perplexity_v3.1_qwen2_2bit.json \
            data/kv_cache/perplexity_v3.1_qwen2_3bit.json \
            data/kv_cache/perplexity_v3.1_qwen2_4bit.json; do
            [ -f "$f" ] || { echo "MISSING: $f"; exit 1; }
            python -c "import json; json.load(open('$f'))" || { echo "INVALID JSON: $f"; exit 1; }
          done
          echo "All 9 v3.1 result files present and valid"

      - name: Check calibration data checksums
        run: |
          echo "b4d43463daad65c0  data/calibration/fq_v2_gemma_4_e2b.npz" | \
            python -c "
          import sys, hashlib
          expected, path = sys.stdin.read().strip().split('  ')
          actual = hashlib.sha256(open(path, 'rb').read()).hexdigest()[:16]
          assert actual == expected, f'Checksum mismatch: {actual} != {expected}'
          print(f'PASS: {path} checksum OK')
          "

      - name: Validate JSON data files
        run: |
          python -c "
          import json, glob
          files = glob.glob('data/kv_cache/*.json') + glob.glob('data/calibration/*.json')
          for f in sorted(files):
              json.load(open(f))
          print(f'OK: {len(files)} JSON files validated')
          "

      - name: Paper compiles (LaTeX check)
        run: |
          if command -v pdflatex &>/dev/null; then
            cd paper && pdflatex -interaction=nonstopmode fajarquant.tex > /dev/null 2>&1 && \
              echo "PASS: paper compiles" || echo "WARN: paper compile failed (non-blocking)"
          else
            echo "SKIP: pdflatex not available in CI"
          fi
