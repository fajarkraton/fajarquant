name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  build-test:
    name: build + test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: cargo build
        run: cargo build --all-targets
      - name: cargo test
        run: cargo test --lib
      - name: cargo clippy
        run: cargo clippy --lib -- -D warnings
      - name: cargo fmt --check
        run: cargo fmt -- --check

  flake-stress:
    name: flake-stress (parallel test load)
    runs-on: ubuntu-latest
    needs: build-test
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: stress test 5x at threads=64
        run: |
          for i in 1 2 3 4 5; do
            echo "=== Stress run $i/5 ==="
            cargo test --lib -- --test-threads=64 || exit 1
          done

  msrv:
    name: MSRV check (Rust 1.87)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.87
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --lib
